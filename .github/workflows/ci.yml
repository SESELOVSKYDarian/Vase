name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vase
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d vase"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vase?schema=public
      AUTH_SECRET: test-secret-not-for-production
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      TRUSTED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      MONITORING_TOKEN: ci-monitoring-token
      UPLOAD_SCAN_MODE: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Sync test database
        run: npm run prisma:db:push

      - name: Seed fixtures
        run: npm run prisma:seed

      - name: Generate typed routes
        run: npx next typegen

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vase
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d vase"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vase?schema=public
      AUTH_SECRET: test-secret-not-for-production
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      TRUSTED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      MONITORING_TOKEN: ci-monitoring-token
      UPLOAD_SCAN_MODE: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Sync test database
        run: npm run prisma:db:push

      - name: Seed fixtures
        run: npm run prisma:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e
